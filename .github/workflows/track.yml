name: Track Stack Exchange

on:
  push:
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays
    # Using a non-round minute to avoid top-of-hour cron spike
    - cron: '37 13 * * 1'

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Track Stack Exchange activity
        run: uv run track.py
      - name: Commit and push if changed
        run: |-
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}" || exit 0
          git pull --rebase
          git push
